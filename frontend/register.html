<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 我来帮</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤝</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form-modern.css">
    <link rel="stylesheet" href="css/mobile-redesign.css">
    <link rel="stylesheet" href="css/datetime-picker.css">
    <style>
        body {
            background: #ffffff;
            min-height: 100vh;
        }
        
        .register-page {
            min-height: auto;
            padding: 1rem;
            box-sizing: border-box;
        }
        
        .register-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0;
            margin-bottom: 1rem;
        }
        
        .register-back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--gray-100);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.25rem;
        }
        
        .register-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-800);
            margin: 0;
        }
        
        .register-brand {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .register-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }
        
        .register-brand-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gray-800);
            margin: 0 0 0.25rem 0;
        }
        
        .register-brand-subtitle {
            font-size: 0.875rem;
            color: var(--gray-500);
            margin: 0;
        }
        
        .register-form {
            /* 移除 flex 样式 */
        }
        
        .register-form .form-group {
            margin-bottom: 1rem;
        }
        
        .register-form .form-label {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.375rem;
        }
        
        .register-form .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        
        .register-form .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .register-form .form-hint {
            font-size: 0.75rem;
            color: var(--gray-400);
            margin-top: 0.375rem;
        }
        
        .register-form .input-wrapper {
            position: relative;
        }
        
        .register-form .password-toggle-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.125rem;
            padding: 0.25rem;
        }
        
        .register-form .verification-code-wrapper {
            display: flex;
            gap: 0.5rem;
        }
        
        .register-form .verification-code-wrapper .form-input {
            flex: 1;
        }
        
        .register-form .btn-send-code {
            white-space: nowrap;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            background: var(--gray-100);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .register-form .btn-send-code:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .register-form .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        
        .register-form .checkbox-input {
            display: none;
        }
        
        .register-form .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid var(--gray-300);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        
        .register-form .checkbox-input:checked + .checkbox-custom {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .register-form .checkbox-input:checked + .checkbox-custom::after {
            content: '✓';
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .register-form .checkbox-text a {
            color: var(--primary-color);
            text-decoration: none;
        }
        
        .register-form .btn-register {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.0625rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.2s;
        }
        
        .register-form .btn-register:active {
            transform: scale(0.98);
        }
        
        .register-footer {
            text-align: center;
            padding: 1.5rem 0;
            font-size: 0.9375rem;
            color: var(--gray-600);
        }
        
        .register-footer .btn-link {
            background: none;
            border: none;
            color: var(--primary-color);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9375rem;
        }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gray-800);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9375rem;
            z-index: 10001;
            opacity: 0;
            transition: all 0.3s;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            background: #10b981;
        }
        
        .toast.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="register-page">
        <div class="register-header">
            <button class="register-back-btn" onclick="goBack()">←</button>
            <h1 class="register-title">注册</h1>
            <div style="width: 40px;"></div>
        </div>
        
        <form id="register-form" onsubmit="handleRegister(event)" class="register-form">
            <div class="form-group">
                <label class="form-label" for="register-nickname">
                    <span>🎭</span> 用户名
                </label>
                <div class="input-wrapper">
                    <input type="text" name="nickname" id="register-nickname" class="form-input" placeholder="请输入用户名" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="register-password">
                    <span>🔒</span> 密码
                </label>
                <div class="input-wrapper">
                    <input type="password" name="password" id="register-password" class="form-input" placeholder="请输入密码" required autocomplete="new-password">
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('register-password')">
                        <span>👁</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="register-email">
                    <span>📧</span> 邮箱
                </label>
                <div class="input-wrapper">
                    <input type="email" name="email" id="register-email" class="form-input" placeholder="请输入邮箱" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="verification-code">
                    <span>🔢</span> 验证码
                </label>
                <div class="input-wrapper verification-code-wrapper">
                    <input type="text" name="verification_code" id="verification-code" class="form-input" placeholder="请输入6位验证码" maxlength="6" required autocomplete="one-time-code">
                    <button type="button" class="btn-send-code" id="send-code-btn" onclick="sendVerificationCode()">
                        获取验证码
                    </button>
                </div>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label" for="register-agree"><input type="checkbox" name="agree" id="register-agree" class="checkbox-input" required id="agree-checkbox">
                    <span class="checkbox-custom"></span>
                    <span class="checkbox-text">我同意<a href="terms.html">用户协议</a>和<a href="privacy.html">隐私政策</a></span>
                </label>
            </div>
            
            <button type="submit" class="btn-register">
                立即注册
            </button>
        </form>
        
        <div class="register-footer">
            已有账号？<button class="btn-link" onclick="goToLogin()">立即登录</button>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <script src="js/config.js"></script>
    <script src="js/app.v2.js"></script>
    <script>
        let codeCountdown = null;
        
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = 'index.html';
            }
        }
        
        function goToLogin() {
            window.location.href = 'index.html?showModal=login';
        }
        
        function showToast(message, type = '') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }
        
        async function sendVerificationCode() {
            const emailInput = document.getElementById('register-email');
            const email = emailInput.value.trim();
            
            if (!email) {
                showToast('请输入邮箱地址', 'error');
                emailInput.focus();
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showToast('请输入有效的邮箱地址', 'error');
                emailInput.focus();
                return;
            }
            
            const btn = document.getElementById('send-code-btn');
            btn.disabled = true;
            let countdown = 60;
            btn.textContent = `${countdown}秒后重发`;
            
            codeCountdown = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重发`;
                if (countdown <= 0) {
                    clearInterval(codeCountdown);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
            
            try {
                const response = await fetch(CONFIG.API_BASE_URL + '/auth/send-verification-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, type: 'register' })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast('验证码已发送到您的邮箱', 'success');
                    console.log('注册测试验证码:', result.data.code);
                } else {
                    showToast(result.message || '发送失败', 'error');
                    clearInterval(codeCountdown);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            } catch (error) {
                console.error('发送验证码错误:', error);
                showToast('发送失败，请检查网络', 'error');
                clearInterval(codeCountdown);
                btn.disabled = false;
                btn.textContent = '获取验证码';
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            
            const form = document.getElementById('register-form');
            const formData = new FormData(form);
            
            const nickname = formData.get('nickname').trim();
            const password = formData.get('password');
            const email = formData.get('email').trim();
            const verification_code = formData.get('verification_code');
            
            if (nickname.length < 3 || nickname.length > 20) {
                showToast('用户名需要3-20个字符', 'error');
                return;
            }
            
            if (password.length < 8) {
                showToast('密码至少8个字符', 'error');
                return;
            }
            
            if (!/^(?=.*[a-zA-Z])(?=.*\d)/.test(password)) {
                showToast('密码需包含字母和数字', 'error');
                return;
            }
            
            if (!verification_code || verification_code.length !== 6) {
                showToast('请输入6位验证码', 'error');
                return;
            }
            
            const agreeCheckbox = document.getElementById('agree-checkbox');
            if (!agreeCheckbox.checked) {
                showToast('请同意用户协议和隐私政策', 'error');
                return;
            }
            
            try {
                const response = await fetch(CONFIG.API_BASE_URL + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nickname,
                        password,
                        email,
                        verification_code
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast('注册成功！', 'success');
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('user', JSON.stringify(result.data.user));
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showToast(result.message || '注册失败', 'error');
                }
            } catch (error) {
                console.error('注册错误:', error);
                showToast('注册失败，请检查网络', 'error');
            }
        }
    </script>
</body>
</html>

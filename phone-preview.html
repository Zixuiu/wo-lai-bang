<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我来帮 - 手机预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      padding-top: 0px;
      margin-top: -100px;
    }
    .phone-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transform-origin: center center;
    }
    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      background: #1a1a1a;
      border-radius: 40px;
      padding: 12px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                  0 0 0 2px #333,
                  inset 0 0 0 2px #2a2a2a;
    }
    .phone-frame {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 30px;
      overflow: hidden;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 30px;
      background: #000;
      border-radius: 0 0 15px 15px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .camera {
      width: 12px;
      height: 12px;
      background: #1a1a1a;
      border-radius: 50%;
    }
    .speaker {
      width: 40px;
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }
    .power-button {
      position: absolute;
      right: -4px;
      top: 120px;
      width: 4px;
      height: 60px;
      background: #2a2a2a;
      border-radius: 0 2px 2px 0;
    }
    .volume-up {
      position: absolute;
      left: -4px;
      top: 100px;
      width: 4px;
      height: 35px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
    }
    .volume-down {
      position: absolute;
      left: -4px;
      top: 150px;
      width: 4px;
      height: 35px;
      background: #2a2a2a;
      border-radius: 2px 0 0 2px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    .info {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
    }
    @media (max-height: 900px), (max-width: 450px) {
      .phone-container {
        transform: scale(0.6);
      }
    }
    @media (max-height: 650px), (max-width: 320px) {
      .phone-container {
        transform: scale(0.45);
      }
    }
  </style>
</head>
<body>
  <div class="phone-container" id="phoneContainer">
    <div class="phone" id="phone">
      <div class="power-button"></div>
      <div class="volume-up"></div>
      <div class="volume-down"></div>
      <div class="phone-frame">
        <div class="notch">
          <div class="speaker"></div>
          <div class="camera"></div>
        </div>
        <iframe class="phone-screen" src="http://localhost:5174/index.html"></iframe>
      </div>
    </div>
    <div class="info" id="info">iPhone X 尺寸 - 375×812</div>
    <div class="controls">
      <button class="btn" onclick="toggleSize('iphone')">iPhone X</button>
      <button class="btn" onclick="toggleSize('iphone-plus')">iPhone Plus</button>
      <button class="btn" onclick="toggleSize('android')">Android</button>
      <button class="btn" onclick="window.open('http://localhost:5174/index.html', '_blank')">全屏查看</button>
    </div>
  </div>
  <script>
    let currentScale = 1;
    let currentType = 'iphone';
    const sizes = {
      'iphone': { width: 375, height: 812 },
      'iphone-plus': { width: 414, height: 896 },
      'android': { width: 360, height: 740 }
    };
    function toggleSize(type) {
      currentType = type;
      const phone = document.getElementById('phone');
      const size = sizes[type];
      phone.style.width = size.width + 'px';
      phone.style.height = size.height + 'px';
      const labels = {
        'iphone': 'iPhone X 尺寸 - 375×812',
        'iphone-plus': 'iPhone Plus 尺寸 - 414×896',
        'android': 'Android 尺寸 - 360×740'
      };
      document.getElementById('info').textContent = labels[type];
      adjustScale();
    }
    function adjustScale() {
      const container = document.getElementById('phoneContainer');
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;
      const size = sizes[currentType];
      const phoneWidth = size.width + 40;
      const phoneHeight = size.height + 120;
      const scaleX = (windowWidth - 40) / phoneWidth;
      const scaleY = (windowHeight - 40) / phoneHeight;
      currentScale = Math.min(scaleX, scaleY, 1);
      container.style.transform = `scale(${currentScale})`;
    }
    window.addEventListener('resize', adjustScale);
    adjustScale();
  </script>
</body>
</html>
